<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Premium File - Safe Link</title>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container-box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 90%; }
        .btn { background-color: #2ecc71; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-block; margin-top: 20px; }
        .btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .timer-text { font-size: 14px; color: #7f8c8d; margin-top: 10px; }
        /* Teknik Anti-Adblock: Gunakan nama class yang umum (bukan 'ads') */
        .content-wrapper { margin: 20px 0; min-height: 100px; background: #fafafa; border: 1px dashed #ddd; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div class="container-box">
    <h2>File Siap Diunduh</h2>
    <p>Klik tombol di bawah untuk memverifikasi dan mendapatkan akses file premium.</p>

    <div class="content-wrapper">
        <p style="font-size: 12px; color: #999;">IKLAN AKAN MUNCUL DI SINI</p>
    </div>

    <button id="startBtn" class="btn">Klik untuk Verifikasi</button>
    
    <div id="step2" style="display:none;">
        <p class="timer-text">Mohon tunggu <span id="seconds">20</span> detik...</p>
        <div class="content-wrapper">
            <p style="font-size: 12px; color: #999;">IKLAN REFRESH</p>
        </div>
    </div>

    <a href="LINK_FILE_PREMIUM_ANDA" id="downloadBtn" class="btn" style="display:none;">Ambil File Sekarang</a>
</div>

<script>
    const startBtn = document.getElementById('startBtn');
    const step2 = document.getElementById('step2');
    const downloadBtn = document.getElementById('downloadBtn');
    const secondsDisplay = document.getElementById('seconds');
    let timeLeft = 20;

    startBtn.addEventListener('click', function() {
        // Step 1: Hilangkan tombol awal & tunjukkan timer
        startBtn.style.display = 'none';
        step2.style.display = 'block';

        // Interval Timer
        const countdown = setInterval(function() {
            timeLeft--;
            secondsDisplay.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(countdown);
                step2.style.display = 'none';
                downloadBtn.style.display = 'inline-block';
            }
        }, 1000);
    });

    // Anti-Adblock Check Sederhana
    window.onload = function() {
        setTimeout(function() {
            if (document.getElementsByClassName('content-wrapper')[0].offsetHeight === 0) {
                alert("Harap matikan AdBlock Anda untuk melanjutkan unduhan file premium.");
            }
        }, 2000);
    };
</script>

</body>
</html>
